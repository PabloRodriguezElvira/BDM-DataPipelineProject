x-project-env: &project-env
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: admin
  MINIO_SECRET_KEY: admin123
  MINIO_SECURE: "false"
  PROJECT_ROOT: /app
  PYTHON_BIN: python
  PYTHONPATH: /app

x-optional-env-file: &optional-env-file
  - path: .env
    required: false

x-app-build: &app-build
  context: .
  dockerfile: Dockerfile

x-airflow-build: &airflow-build
  context: .
  dockerfile: Dockerfile.airflow

x-airflow-env: &airflow-env
  <<: *project-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
  AIRFLOW__WEBSERVER__SECRET_KEY: airflow_secret_key

x-airflow-volumes: &airflow-volumes
  - .:/app
  - ./dags:/opt/airflow/dags
  - airflow_logs:/opt/airflow/logs
  - airflow_plugins:/opt/airflow/plugins

services:
  app:
    image: bdm-app:latest
    build: *app-build
    container_name: bdm-app
    env_file: *optional-env-file
    environment:
      <<: *project-env
    volumes:
      - .:/app
    depends_on:
      - minio
      - kafka

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9090:9090"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    volumes:
      - ./data_MinIO:/data
    command: server /data --console-address ":9090"

  minio-bootstrap:
    image: bdm-app:latest
    build: *app-build
    container_name: minio-bootstrap
    env_file: *optional-env-file
    environment:
      <<: *project-env
    volumes:
      - .:/app
    depends_on:
      - minio
    command: python -m src.common.minio_manager
    restart: "no"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_MESSAGE_MAX_BYTES: 5242880
      KAFKA_MAX_REQUEST_SIZE: 5242880
    depends_on:
      - zookeeper

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      - kafka

  postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_db:/var/lib/postgresql/data

  airflow-init:
    image: bdm-airflow:2.9.1
    build: *airflow-build
    container_name: airflow-init
    env_file: *optional-env-file
    environment:
      <<: *airflow-env
    volumes: *airflow-volumes
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      minio-bootstrap:
        condition: service_completed_successfully
      kafka:
        condition: service_started
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username admin \
          --password admin \
          --firstname admin \
          --lastname admin \
          --role Admin \
          --email admin@example.com
    restart: "no"

  airflow-webserver:
    image: bdm-airflow:2.9.1
    build: *airflow-build
    container_name: airflow-webserver
    env_file: *optional-env-file
    environment:
      <<: *airflow-env
      AIRFLOW__CORE__DAG_RUN_CONF_OVERRIDES_PARAMS: "true"
    volumes: *airflow-volumes
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      minio-bootstrap:
        condition: service_completed_successfully
      kafka:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    command:
      - bash
      - -c
      - rm -f /opt/airflow/airflow-webserver.pid && exec airflow webserver
    ports:
      - "8080:8080"

  airflow-scheduler:
    image: bdm-airflow:2.9.1
    build: *airflow-build
    container_name: airflow-scheduler
    env_file: *optional-env-file
    environment:
      <<: *airflow-env
    volumes: *airflow-volumes
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      minio-bootstrap:
        condition: service_completed_successfully
      kafka:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    command: scheduler

volumes:
  postgres_db:
  airflow_logs:
  airflow_plugins:
