x-project-env: &project-env
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: admin
  MINIO_SECRET_KEY: admin123
  MINIO_SECURE: "false"
  PROJECT_ROOT: /app
  PYTHON_BIN: python
  PYTHONPATH: /app
  CLICKHOUSE_HOST: clickhouse
  CLICKHOUSE_USER: default
  CLICKHOUSE_PASSWORD: clickhouse
  MONGO_HOST: mongodb
  MONGO_PORT: "27017"
  MONGO_USER: root
  MONGO_PASSWORD: rootpassword
  MONGO_DB: trusted_zone
  MILVUS_HOST: milvus
  MILVUS_PORT: "19530"

x-optional-env-file: &optional-env-file
  - path: .env
    required: false

x-app-build: &app-build
  context: .
  dockerfile: Dockerfile

x-airflow-build: &airflow-build
  context: .
  dockerfile: Dockerfile.airflow

x-airflow-env: &airflow-env
  <<: *project-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
  AIRFLOW__WEBSERVER__SECRET_KEY: airflow_secret_key

x-airflow-volumes: &airflow-volumes
  - .:/app
  - ./dags:/opt/airflow/dags
  - airflow_logs:/opt/airflow/logs
  - airflow_plugins:/opt/airflow/plugins

services:
  app:
    image: bdm-app:latest
    build: *app-build
    container_name: bdm-app
    env_file: *optional-env-file
    environment:
      <<: *project-env
    volumes:
      - .:/app
    depends_on:
      - minio
      - kafka
      - mongodb

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9090:9090"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    volumes:
      - ./data_MinIO:/data
    command: server /data --console-address ":9090"

  minio-bootstrap:
    image: bdm-app:latest
    build: *app-build
    container_name: minio-bootstrap
    env_file: *optional-env-file
    environment:
      <<: *project-env
    volumes:
      - .:/app
    depends_on:
      - minio
    command: python -m src.common.minio_manager
    restart: "no"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_MESSAGE_MAX_BYTES: 5242880
      KAFKA_MAX_REQUEST_SIZE: 5242880
    depends_on:
      - zookeeper

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      - kafka

  postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_db:/var/lib/postgresql/data

  airflow-init:
    image: bdm-airflow:2.9.1
    build: *airflow-build
    container_name: airflow-init
    env_file: *optional-env-file
    environment:
      <<: *airflow-env
    volumes: *airflow-volumes
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      minio-bootstrap:
        condition: service_completed_successfully
      kafka:
        condition: service_started
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username admin \
          --password admin \
          --firstname admin \
          --lastname admin \
          --role Admin \
          --email admin@example.com
    restart: "no"
  airflow-webserver:
    image: bdm-airflow:2.9.1
    build: *airflow-build
    container_name: airflow-webserver
    env_file: *optional-env-file
    environment:
      <<: *airflow-env
      AIRFLOW__CORE__DAG_RUN_CONF_OVERRIDES_PARAMS: "true"
      AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: 300
    volumes: *airflow-volumes
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      minio-bootstrap:
        condition: service_completed_successfully
      kafka:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    command:
      - bash
      - -c
      - rm -f /opt/airflow/airflow-webserver.pid && exec airflow webserver
    ports:
      - "8080:8080"
  airflow-scheduler:
    image: bdm-airflow:2.9.1
    build: *airflow-build
    container_name: airflow-scheduler
    env_file: *optional-env-file
    environment:
      <<: *airflow-env
    volumes: *airflow-volumes
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      minio-bootstrap:
        condition: service_completed_successfully
      kafka:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    command: scheduler

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9001:9000"   # Native client (host 9001 avoids conflict with MinIO:9000)
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    
  mongodb:
    image: public.ecr.aws/docker/library/mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    volumes:
      - mongodb_data:/data/db

  mongo-express:
    image: public.ecr.aws/docker/library/mongo-express:latest
    container_name: mongo-express
    ports:
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: rootpassword
      ME_CONFIG_MONGODB_URL: mongodb://root:rootpassword@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongodb
    restart: unless-stopped

  # ── Milvus standalone (etcd + dedicated MinIO + milvus core) ──────────────
  # Vector database used by the Exploitation Zone for unstructured embeddings.
  # Milvus standalone needs its own etcd (metadata) and a private MinIO
  # instance (object storage). We keep them isolated from the project's
  # main MinIO to avoid bucket-name conflicts and shared-credentials issues.

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: milvus-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - milvus_etcd:/etcd
    command: >
      etcd
      -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls http://0.0.0.0:2379
      --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: milvus-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - milvus_minio:/minio_data
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.4.5
    container_name: milvus
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"   # gRPC (PyMilvus client)
      - "9091:9091"     # health/metrics
    depends_on:
      - milvus-etcd
      - milvus-minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 60s

volumes:
  postgres_db:
  airflow_logs:
  airflow_plugins:
  clickhouse_data:
  mongodb_data:
  milvus_etcd:
  milvus_minio:
  milvus_data:
